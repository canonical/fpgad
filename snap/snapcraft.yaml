title: fpgad
name: fpgad
base: core24
adopt-info: version
summary: An FPGA manager daemon that handles the dirty work for you
description: |
  An FPGA manager daemon that handles the dirty work for you.
grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots
source-code:
  - https://github.com/canonical/fpgad
license: GPL-3.0
issues:
  - https://github.com/canonical/fpgad/issues
package-repositories:
  - type: apt
    ppa: ubuntu-xilinx/default
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [arm64]
    build-for: [arm64]
  ppc64el:
    build-on: [ppc64el]
    build-for: [ppc64el]
  riscv64:
    build-on: [riscv64]
    build-for: [riscv64]
icon: snap/assets/icon.svg
environment:
  # Set path to snap components
  SNAP_COMPONENTS: /snap/$SNAP_INSTANCE_NAME/components/$SNAP_REVISION
  # Add dfx-mgr libraries to library path (if component is installed)
  LD_LIBRARY_PATH: $SNAP_COMPONENTS/dfx-mgr/usr/lib:$SNAP_COMPONENTS/dfx-mgr/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:$LD_LIBRARY_PATH
components:
  dfx-mgr:
    type: standard
    summary: optional component to include dfx-mgr binaries
    description: |
      This component enables dfx-mgr integration for xilinx boards.
      It provides dfx-mgr-client and dfx-mgrd.
      FPGAd will run and monitor the dfx-mgrd binary and interface with it to enabled full dfx-mgr functionality \
      via FPGAd
slots:
  daemon-dbus:
    interface: dbus
    bus: system
    name: com.canonical.fpgad
plugs:
  cli-dbus:
    interface: dbus
    bus: system
    name: com.canonical.fpgad
  provider-content:
    interface: content
    content: provider-content
    target: $SNAP_DATA/provider-content
  device-tree-overlays:
    interface: system-files
    write:
      - /sys/kernel/config/device-tree/overlays
  dfx-mgr-socket:
    interface: system-files
    write:
      - /run/dfx-mgrd.socket
apps:
  fpgad:
    command: bin/fpgad_cli
    plugs:
      - cli-dbus
    aliases:
      - cli
  daemon:
    command: bin/fpgad
    daemon: dbus
    restart-condition: always
    start-timeout: 30s
    install-mode: enable
    slots:
      - daemon-dbus
    plugs:
      - fpga
      - kernel-firmware-control
      - hardware-observe
      - dfx-mgr-socket
      - device-tree-overlays
    activates-on:
      - daemon-dbus
    environment:
      RUST_LOG: trace
    plugs:
      - fpga
parts:
  version:
    plugin: nil
    source: .
    build-snaps:
      - jq
    override-pull: |
      craftctl default
      cargo_version=$(cargo metadata --no-deps --format-version 1 | jq -r .packages[0].version)
      craftctl set version="$cargo_version+git$(date +'%Y%m%d').$(git describe --always --exclude '*')"
  # with `snapcraft remote-build` cargo build with workspace is not working as
  # it is in local builds so keeping the parts separated to make sure `remote-build`
  # also works as expected. see: https://github.com/canonical/fpgad/pull/52
  # for details.
  cli:
    plugin: rust
    source: .
    rust-path:
      - cli
    rust-channel: 'stable'
  daemon:
    plugin: rust
    source: .
    rust-path:
      - daemon
    rust-channel: 'stable'
  dfx-mgr:
    plugin: nil
    stage-packages:
      - dfx-mgr
    override-stage: |
      craftctl default
      cat << 'EOF' > daemon.conf
      {
        "firmware_location": [
          "/var/snap/fpgad/current/provider-content/"
        ]
      }
      EOF
  softener_wrapper:
    organize:
      # move everything, including the staged packages
      "*": (component/dfx-mgr)
      daemon.conf: (component/dfx-mgr)
    plugin: dump
    source: snap/assets
    organize:
      softener_wrapper: bin/softener_wrapper
    stage:
      - bin/softener_wrapper
# TODO: the daemon.conf should be copied into $SNAP_COMMON on install hook if - and only if - it doesn't already exist
layout:
  # For dfx-mgr configuration files (when component is installed)
  /etc/dfx-mgrd:
    bind: $SNAP_COMMON/etc/dfx-mgrd
