name: Run integration tests on a DUT via testflinger
on:
  workflow_dispatch:
  pull_request:
jobs:
  binary-integration-tests:
    name: Build and Test the Daemon Binary on DUT
    runs-on: [self-hosted, self-hosted-linux-amd64-jammy-private-endpoint-medium]
    #    todo: enable testflinger environment
    #    environment:
    #      name: testflinger
    #    if: ${{ vars.TESTFLINGER_TESTS_ENABLED == '1' && ! github.event.pull_request.draft}}
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        shell: bash
        run: |
          echo "::group::install dependencies"
            sudo snap install yq
          echo "::endgroup::"
      - name: Prepare Testflinger Job
        id: prepare-tf-job
        shell: bash
        run: |
          echo "::group::creating fpgad.gz tarball"
            tar -czvf ../fpgad.gz --exclude="target" --exclude=".git" -C ../ ./fpgad
            mv ../fpgad.gz ./fpgad.gz
          echo "::endgroup::"

          echo "::group::creating job.yaml"
            yq '.test_data.attachments = [
            {"agent": "device_script.sh", "local": "'"$(pwd)"'/.github/testflinger-assets/test_binary_device_script.sh"},
            {"agent": "fpgad.gz", "local": "'"$(pwd)"'/fpgad.gz"}
            ]' .github/testflinger-assets/testflinger_job.yaml | tee job.yaml
          echo "::endgroup::"

          echo "test_path=job.yaml" >> $GITHUB_OUTPUT
      - name: Submit TF job
        id: submit
        uses: canonical/testflinger/.github/actions/submit@rev263
        continue-on-error: true
        with:
          poll: true
          job-path: ${{ steps.prepare-tf-job.outputs.test_path }}
      - name: Fetch and Display Artifacts
        shell: bash
        run: |
          echo "::group::retrieve llvm-cov artifacts"
            testflinger artifacts ${{steps.submit.outputs.id }}
            tar -xvzf artifacts.tgz
          echo "::endgroup::"

          for f in artifacts/* ; do
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: llvm-cov-artifacts
          path: artifacts/*
      - name: Report test status
        shell: bash
        run: |
          if [ "${{ steps.submit.outcome }}" != "success" ]; then
            echo "::error::test job didn't complete successfully"
            exit 1
          fi
          if [[ ! -f artifacts/coverage_test.log ]]; then
            echo "::error::coverage_test.log not found, did the tests fail to start?"
            exit 1
          fi
          if grep -q "test result: FAILED" artifacts/coverage_test.log; then
            echo "::error::found failure phrase in coverage_test.log"
            exit 1
          fi
  snap-build:
    name: Check Snap Builds
    runs-on: [self-hosted, linux, noble, ARM64]
    outputs:
      artifact_id: ${{ steps.upload-snap.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v6
      - uses: canonical/action-build@v1.3.0
        id: snapcraft
      - name: Package snap and components
        id: package-snap
        run: |
          echo "::group::Listing snap and component files"
          echo "Snap files:"
          find . -maxdepth 1 -name "*.snap" -type f
          echo ""
          echo "Component files:"
          find . -maxdepth 1 -name "*.comp" -type f
          echo "::endgroup::"

          echo "::group::Packaging snap and component files"
          # Collect snap file
          SNAP_FILE="${{ steps.snapcraft.outputs.snap }}"

          # Find component files - must exist
          COMP_FILES=$(find . -maxdepth 1 -name "*.comp" -type f)
          if [ -z "$COMP_FILES" ]; then
            echo "::error::No component files found - build may have failed"
            exit 1
          fi

          # Create tarball with snap and components
          tar -czvf fpgad-snap-package.tar.gz "$SNAP_FILE" $COMP_FILES
          echo "Created tarball: fpgad-snap-package.tar.gz"
          echo "package_path=$(pwd)/fpgad-snap-package.tar.gz" >> $GITHUB_OUTPUT
          echo "::endgroup::"
      - uses: actions/upload-artifact@v7
        id: upload-snap
        with:
          name: snap-fpgad-${{ github.event.pull_request != null && github.event.pull_request.head.sha || 'workflow-dispatch' }}
          path: ${{ steps.package-snap.outputs.package_path }}
  snap-integration-tests:
    name: Install and Test the Snap Package on DUT
    runs-on: [self-hosted, self-hosted-linux-amd64-noble-private-endpoint-medium]
    if: ${{ !github.event.pull_request.draft }}
    needs: ['snap-build']
    timeout-minutes: 3600
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        shell: bash
        run: |
          echo "::group::install dependencies"
            sudo snap install yq
          echo "::endgroup::"
      - name: Download built snap
        id: download-snap
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.snap-build.outputs.artifact_id }}
          path: ./snap-download
      - name: Prepare Testflinger Job
        id: prepare-tf-job
        run: |
          echo "::group::Locating snap package tarball"
            # actions/download-artifact@v8 creates a subdirectory named after the artifact
            # Look for the tarball in any subdirectory (artifact name may vary based on commit SHA)
            echo "Contents of snap-download directory:"
            ls -lR ./snap-download || true

            SNAP_TARBALL=$(find ./snap-download -name "fpgad-snap-package.tar.gz" -type f | head -n 1)
            if [[ -z "$SNAP_TARBALL" || ! -f "$SNAP_TARBALL" ]]; then
              echo "::error::Snap package tarball 'fpgad-snap-package.tar.gz' not found in download directory"
              exit 1
            fi
            echo "Found snap package at: $SNAP_TARBALL"
            # Copy to current directory for use in job.yaml
            cp "$SNAP_TARBALL" ./fpgad-snap-package.tar.gz
            echo "Copied to: $(pwd)/fpgad-snap-package.tar.gz"
          echo "::endgroup::"

          echo "::group::creating job.yaml"
            yq '.test_data.attachments = [
            { "agent": "device_script.sh",        "local": "'"$(pwd)"'/.github/testflinger-assets/test_snap_device_script.sh" },
            { "agent": "fpgad-snap-package.tar.gz", "local": "'"$(pwd)"'/fpgad-snap-package.tar.gz" },
            ]' .github/testflinger-assets/testflinger_job.yaml | tee job.yaml
          echo "::endgroup::"

          echo "test_path=job.yaml" >> $GITHUB_OUTPUT
      - name: Submit TF job
        id: submit
        uses: canonical/testflinger/.github/actions/submit@rev263
        continue-on-error: true
        with:
          poll: true
          job-path: ${{ steps.prepare-tf-job.outputs.test_path }}
      - name: Fetch and Display Artifacts
        shell: bash
        run: |
          echo "::group::retrieving snap test artifacts"
            testflinger artifacts ${{steps.submit.outputs.id }}
            tar -xvzf artifacts.tgz
          echo "::endgroup::"

          for f in artifacts/* ; do
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: snap-testing-artifacts
          path: artifacts/*
      - name: Report test status
        shell: bash
        run: |-
          if [ "${{ steps.submit.outcome }}" != "success" ]; then
            echo "::error::test job didn't complete successfully"
            exit 1
          fi
          if [[ ! -f artifacts/snap_test.log ]]; then
            echo "::error::snap_test.log not found, did the tests fail to start?"
            exit 1
          fi
          if grep -q "FAILED (" artifacts/snap_test.log; then
            echo "::error::found failure phrase in snap_test.log"
            exit 1
          fi
