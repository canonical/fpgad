name: Code Formatting Check
on:
  pull_request:
jobs:
  git-commit-check:
    name: Check Git Commit Formatting
    runs-on: ubuntu-latest
    if: |
      github.actor != 'renovate[bot]' &&
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Python Dependencies
        run: |
          echo "::group::install python dependencies"
          python -m venv .venv
          source .venv/bin/activate
          pip install -r scripts/ci/requirements.txt
          echo "::endgroup::"
      - name: Check Signatures
        run: |
          failed_commits=()
          for rev in $(git rev-list origin/${{ github.base_ref }}..HEAD --skip 1);
          do
              result=$(git -c log.showSignature=false show $rev --pretty="%G? %GS" --quiet)

              echo "::group::Checking $rev"

              if [[ $result == N* ]]; then
                  # Commit has no signature
                  # https://git-scm.com/docs/git-show#Documentation/git-show.txt-emGem
                  echo "ERROR: There are unsigned commits!"
                  failed_commits+=("$rev")
              else
                  echo "$result"
              fi
              echo "::endgroup::"
          done

          # Report any failures
          if [ ${#failed_commits[@]} -ne 0 ]; then
            echo "::error::The following commits have unsigned commits:"
            for c in "${failed_commits[@]}"; do
              echo "- $c"
            done
            exit 1
          else
            echo "✅ All commits signed."
          fi
      - name: Check Format of Git Commits
        run: |
          echo "::group::prepare git"
          source .venv/bin/activate
          git config log.showSignature false
          echo "::endgroup::"

          failed_commits=()
          commits="$(git rev-list origin/${{ github.base_ref }}..HEAD --skip 1 | paste -s -d,)"
          IFS=','
          for  commit in $commits; do
            echo "::group::$commit"
            if ! gitlint --debug --commit "$commit"; then
              failed_commits+=("$commit")
            fi
            echo "::endgroup::"
          done
          unset IFS

          # Report any failures
          if [ ${#failed_commits[@]} -ne 0 ]; then
            echo "::error::The following commits failed gitlint:"
            for c in "${failed_commits[@]}"; do
              echo "- $c"
            done
            exit 1
          else
            echo "✅ All commits passed gitlint."
          fi
  python-check:
    name: Check Python Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Dependencies
        run: |
          echo "::group::apt output"
          sudo env DEBIAN_FRONTEND=noninteractive apt update
          sudo env DEBIAN_FRONTEND=noninteractive apt install -y python3-venv
          echo "::endgroup::"
      - name: Linting with Ruff
        run: |
          echo "::group::prepare python"
          python3 -m venv .venv
          source .venv/bin/activate
          pip install ruff==0.11.3
          echo "::endgroup::"

          changed_python_files=$(git diff --name-only --diff-filter=ACMRTUXB origin/${{ github.base_ref }} | grep -E "\.py$" || true)
          if [ -z $changed_python_files ]; then
            echo "✅ No changed python files to check."
            exit 0
          fi
          bad_files=()
          for python_file in $changed_python_files;
          do
            echo "::group::checking $python_file"
            if ! { ruff format --check -v "$python_file" && ruff check "$python_file"; }; then
              bad_files+=("$python_file")
            fi
            echo "::endgroup::"
          done

          # Report any failures
          if [ ${#bad_files[@]} -ne 0 ]; then
            echo "::error::The following python files failed Ruff checks:"
            for c in "${bad_files[@]}"; do
              echo "- $c"
            done
            exit 1
          else
            echo "✅ All python files passed Ruff checks."
          fi
  yaml-check:
    name: Check YAML Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.21.0'
      - name: Run yamlfmt
        run: |
          echo "::group::install yamlfmt"
          go install github.com/google/yamlfmt/cmd/yamlfmt@v0.16.0
          echo "::endgroup::"

          echo "::group::yamlfmt output"
          yamlfmt -lint .
          echo "::endgroup::"
  version-bump-check:
    name: Check Version Bump for Rust Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check if version was bumped
        run: |
          echo "::group::check for modified Rust source files"
          # Check if any .rs files in <package>/src/ directories have been modified
          changed_rust_files=$(git diff --name-only --diff-filter=ACMRTUXB origin/${{ github.base_ref }} | grep -E "^(daemon|cli|fpgad_macros)/src/.*\.rs$" || true)

          if [ -z "$changed_rust_files" ]; then
            echo "✅ No Rust source files modified - version bump not required."
            exit 0
          fi

          echo "Modified Rust source files detected:"
          echo "$changed_rust_files"
          echo "::endgroup::"

          echo "::group::extract version numbers"
          # Get the old version from base branch
          git show origin/${{ github.base_ref }}:Cargo.toml > /tmp/base_cargo.toml
          old_version=$(grep -A 10 '^\[workspace.package\]' /tmp/base_cargo.toml | grep '^version' | head -1 | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')

          # Get the new version from current branch
          new_version=$(grep -A 10 '^\[workspace.package\]' Cargo.toml | grep '^version' | head -1 | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')

          if [ -z "$old_version" ]; then
            echo "::error::Could not extract old version from base branch Cargo.toml"
            exit 1
          fi

          if [ -z "$new_version" ]; then
            echo "::error::Could not extract new version from current Cargo.toml"
            exit 1
          fi

          echo "Old version: $old_version"
          echo "New version: $new_version"
          echo "::endgroup::"

          echo "::group::compare versions using semver"
          # Parse semver components (major.minor.patch[-prerelease][+build])
          parse_version() {
            local version=$1
            # Extract major.minor.patch (ignore pre-release and build metadata for now)
            local base_version=$(echo "$version" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
            echo "$base_version"
          }

          old_base=$(parse_version "$old_version")
          new_base=$(parse_version "$new_version")

          # Split into components
          IFS='.' read -r old_major old_minor old_patch <<< "$old_base"
          IFS='.' read -r new_major new_minor new_patch <<< "$new_base"

          # Compare versions
          version_increased=false

          if [ "$new_major" -gt "$old_major" ]; then
            version_increased=true
          elif [ "$new_major" -eq "$old_major" ] && [ "$new_minor" -gt "$old_minor" ]; then
            version_increased=true
          elif [ "$new_major" -eq "$old_major" ] && [ "$new_minor" -eq "$old_minor" ] && [ "$new_patch" -gt "$old_patch" ]; then
            version_increased=true
          fi

          if [ "$version_increased" = false ]; then
            echo "::error::Version was not increased!%0A\
          Old version: $old_version%0A\
          New version: $new_version%0A\
          %0A\
          Rust source files were modified but the version was not bumped in Cargo.toml.%0A\
          Please update the version in the [workspace.package] section of the root Cargo.toml.%0A\
          Version must follow semver and be greater than $old_version.%0A\
          %0A\
          Modified Rust files:%0A\
          $(echo "$changed_rust_files" | sed 's/^/- /' | tr '\n' '|' | sed 's/|/%0A/g')"
            exit 1
          else
            echo "✅ Version was properly increased: $old_version → $new_version"
            echo "::endgroup::"
          fi
  rust-check:
    name: Check Rust Code
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - name: Run clippy
        run: |
          echo "::group::cargo clippy output"
          cargo clippy --workspace --all-targets --all-features -v
          echo "::endgroup::"
      - name: Run fmt
        run: |
          echo "::group::cargo fmt results"
          cargo fmt --check -v
          echo "::endgroup::"
      - name: Run unit tests
        run: |-
          echo "::group::unit test results"
          cargo test --bins
          echo "::endgroup::"
